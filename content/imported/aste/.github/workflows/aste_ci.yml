name: ASTE CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  schedule:
    - cron: '0 8 * * 2'  # run once in a week (here Tue at 8am)

concurrency:
  group: ${ {github.event_name }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{github.event_name == 'pull_request'}}

jobs:
  build:
    name: ${{ format('{0} {1}', matrix.CXX, matrix.TYPE) }}
    runs-on: ubuntu-latest
    container:
      image: ubuntu:rolling
      options: --shm-size=2gb
    defaults:
      run:
        shell: "bash --login -eo pipefail {0}"
    strategy:
      fail-fast: false
      matrix:
        CXX: ["clang++", "g++"]
        TYPE: ["Debug", "Release"]
    env:
      CXX: ${{ matrix.CXX }}
      CXX_FLAGS: "-Werror -Wall -Wextra -Wno-unused-parameter"
      CTEST_OUTPUT_ON_FAILURE: "Yes"
      CMAKE_BUILD_PARALLEL_LEVEL: 4

    steps:
      - name: setup system
        run: |
          useradd -m -s /bin/bash precice
          apt-get -y update && apt-get -y upgrade
          apt-get install -qq -y python3-pip python3-venv libmetis-dev time clang libvtk9-dev
      - name: build preCICE
        uses: precice/setup-precice-action@main
        with:
          precice-version: develop
          install-prefix: /usr/local
      - uses: actions/checkout@v6
      - name: install example dependencies in a venv
        run: |
          python3 -m venv venv --system-site-packages
          source venv/bin/activate
          pip3 install --upgrade pip
          pip3 install -r requirements.txt
          pip3 list --verbose

      - name: Prepare build directory
        run: |
          mkdir build
      - name: build aste
        working-directory: build
        run: |
          source ../venv/bin/activate
          cmake -DCMAKE_BUILD_TYPE=${{ matrix.TYPE }} ..
          cmake --build .
      - name: Adjust user rights
        run: chown -R precice .
      - name: run test
        working-directory: build
        run: |
          su -c "source ../venv/bin/activate && ctest --output-on-failure" precice
