<div class="row">
{{- range $loop, $item := .Site.Data.funding -}}
<div class="col-md-6">
        <div class="panel panel-default panel-custom">
          <div class="panel-heading-precice">
                <a href="{{ $item.url }}" target="_blank" class="no-icon panel-title">
                <strong>
            {{ $item.title }}
                </strong>
                </a>
          </div>
          <div class="panel-body">
            <div class="row">
              <div class="col-sm-4">
                <a href="{{ $item.url }}" target="_blank" class="no-icon">
                <img src="{{ $item.img }}" alt="Logo" class="img-responsive">
                </a>
              </div>
              <div class="col-sm-8">
                {{- if $item.description -}}<p><small>{{ $item.description }}</small></p>{{- end -}}
                {{- if $item.number -}}<p>Funding number: {{ $item.number }}</p>{{- end -}}
                <p>Years running: {{ $item.period }}</p>
              </div>
            </div>
          </div>
        </div>
      </div>
{{- end -}}
</div>
