{{ define "main" }}
<div class="post-header">
   <h1 class="post-title-main">{{ .Title }}</h1>
</div>
<div class="post-content">
    {{- if .Summary -}}
    <div class="summary">
        {{ .Summary | markdownify }}
    </div>
    {{- end -}}
    {{ .Content }}
    {{- partial "commento.html" . -}}
    {{- partial "breadcrumb.html" . -}}
</div>
{{ end }}
