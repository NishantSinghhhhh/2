baseURL: "https://precice.org/"
indexFiles:
  - README.md
  - index.md
  - _index.md
title: "preCICE - The Coupling Library"
uglyURLs: true

markup:
  goldmark:
    renderer:
      unsafe: true

ignoreFiles:
  - "changelog-entries/"
  - "\\.github/"
  - "CONTRIBUTING\\.md$"
  - "LICENSE\\.md$"
  - "tools/"

# -------------------------------------------------------------
# CASCADE: Automatically applies frontmatter based on folder
# -------------------------------------------------------------
cascade:
  - target:
      path: /**
    params:
      layout: "page"
      comments: true
      search: true
      topnav: "topnav"

  - target:
      path: /docs/**
    params:
      comments: false
      sidebar: "docs_sidebar"
      toc: true

  - target:
      path: /tutorials/**
    params:
      comments: false
      sidebar: "tutorial_sidebar"
      toc: true

  - target:
      path: /imported/tutorials/**
    params:
      comments: false
      sidebar: "tutorial_sidebar"
      toc: true
      github_editme_path: "https://github.com/precice/tutorials/edit/develop/"

  - target:
      path: /imported/openfoam-adapter/**
    params:
      comments: false
      sidebar: "docs_sidebar"
      toc: true
      github_editme_path: "https://github.com/precice/openfoam-adapter/edit/develop/"

  - target:
      path: /imported/aste/**
    params:
      comments: false
      sidebar: "docs_sidebar"
      toc: true
      github_editme_path: "https://github.com/precice/aste/edit/develop/"

  - target:
      path: /imported/micro-manager/**
    params:
      comments: false
      sidebar: "docs_sidebar"
      toc: true
      github_editme_path: "https://github.com/precice/micro-manager/edit/develop/"

  - target:
      path: /imported/fmi-runner/**
    params:
      comments: false
      sidebar: "docs_sidebar"
      toc: true
      github_editme_path: "https://github.com/precice/fmi-runner/edit/main/"

  - target:
      path: /imported/su2-adapter/**
    params:
      comments: false
      sidebar: "docs_sidebar"
      toc: true
      github_editme_path: "https://github.com/precice/su2-adapter/edit/develop/"

  - target:
      path: /imported/dune-adapter/**
    params:
      comments: false
      sidebar: "docs_sidebar"
      toc: true
      github_editme_path: "https://github.com/precice/dune-adapter/edit/main/"

  - target:
      path: /imported/dumux-adapter/**
    params:
      comments: false
      sidebar: "docs_sidebar"
      toc: true
      github_editme_path: "https://github.com/precice/dumux-adapter/edit/develop/"

  - target:
      path: /imported/preeco-orga/**
    params:
      comments: false
      sidebar: "community_sidebar"
      toc: true
      github_editme_path: "https://github.com/precice/preeco-orga/edit/main/"

  - target:
      path: /community/**
    params:
      comments: false
      sidebar: "community_sidebar"
      toc: true

