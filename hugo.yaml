# -------------------------------------------------------------
# VIRTUAL MOUNTS: Pulls submodules into the content folder
# -------------------------------------------------------------
module:
  mounts:
    - source: content
      target: content
    - source: static
      target: static
    - source: layouts
      target: layouts
    - source: data
      target: data
    - source: assets
      target: assets
    - source: imported/tutorials
      target: content/imported/tutorials
    - source: imported/openfoam-adapter
      target: content/imported/openfoam-adapter
    - source: imported/aste
      target: content/imported/aste
    - source: imported/micro-manager
      target: content/imported/micro-manager
    - source: imported/fmi-runner
      target: content/imported/fmi-runner
    - source: imported/su2-adapter
      target: content/imported/su2-adapter
    - source: imported/dune-adapter
      target: content/imported/dune-adapter
    - source: imported/dumux-adapter
      target: content/imported/dumux-adapter
    - source: imported/preeco-orga
      target: content/imported/preeco-orga

frontmatter:
  date:
    - date
    - publishDate
    - lastmod
  url:
    - permalink
    - url

# -------------------------------------------------------------
# PERMALINKS
# Hugo 0.144.0+: :contentbasename is valid and preferred
# for imported submodule content to preserve correct URLs
# -------------------------------------------------------------
permalinks:
  page:
    docs: "/:filename"
    community: "/:filename"
    about: "/:filename"
    tutorials: "/:filename"
    posts: "/:filename"
    privacy: "/:filename"
    imported: "/:contentbasename"
  section:
    docs: "/:sections[last]"
    community: "/:sections[last]"
    about: "/:sections[last]"
    tutorials: "/:sections[last]"
    posts: "/:sections[last]"
    privacy: "/:sections[last]"
    imported: "/:sections[last]"